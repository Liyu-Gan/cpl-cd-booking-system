<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPL/CD 测试预约系统（云端同步版）</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>
    <style>
        body {
            padding: 20px;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .system-switch {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .system-btn {
            padding: 8px 20px;
            border-radius: 4px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
        }
        .system-btn.active {
            background: #0d6efd;
            color: white;
            border-color: #0d6efd;
        }
        .time-bar-container {
            margin: 30px 0;
            padding: 20px;
            background: white;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }
        .time-bar {
            height: 60px;
            width: 100%;
            position: relative;
            background: #28a745;
            border-radius: 4px;
            overflow: hidden;
        }
        .booked-block {
            position: absolute;
            height: 100%;
            background: #dc3545;
            border-radius: 2px;
            color: white;
            font-size: 12px;
            padding: 5px;
            box-sizing: border-box;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            cursor: pointer;
        }
        .time-ticks {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }
        .form-area {
            margin-bottom: 20px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }
        .booked-item {
            padding: 10px;
            margin: 5px 0;
            border-radius: 6px;
            background: #f8f9fa;
            border-left: 4px solid #dc3545;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #message {
            margin-top: 15px;
        }
        .stat-item {
            padding: 10px;
            margin: 5px 0;
            border-radius: 6px;
            background: #e9f7fe;
            border-left: 4px solid #17a2b8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-total {
            font-weight: bold;
            font-size: 1.1em;
            background: #f0f8fb;
            border-left-color: #007bff;
        }
        .duration-label {
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-5" id="system-title">CPL测试预约系统（云端同步）</h1>

        <div class="system-switch">
            <button class="system-btn active" onclick="switchSystem('cpl')">CPL预约系统</button>
            <button class="system-btn" onclick="switchSystem('cd')">CD预约系统</button>
        </div>

        <div class="form-area">
            <h5 class="mb-3">预约时段设置</h5>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">选择日期</label>
                    <input type="date" id="date-picker" class="form-control">
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">起始时间</label>
                    <div class="d-flex gap-2">
                        <input type="number" id="start-hour" class="form-control" min="0" max="23" placeholder="时(0-23)" value="0">
                        <input type="number" id="start-min" class="form-control" min="0" max="59" placeholder="分(0-59)" value="0">
                        <input type="number" id="start-sec" class="form-control" min="0" max="59" placeholder="秒(0-59)" value="0">
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">结束时间</label>
                    <div class="d-flex gap-2">
                        <input type="number" id="end-hour" class="form-control" min="0" max="23" placeholder="时(0-23)" value="1">
                        <input type="number" id="end-min" class="form-control" min="0" max="59" placeholder="分(0-59)" value="0">
                        <input type="number" id="end-sec" class="form-control" min="0" max="59" placeholder="秒(0-59)" value="0">
                    </div>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-12">
                    <label class="form-label">预约人姓名</label>
                    <input type="text" id="person-name" class="form-control" placeholder="请输入预约人姓名">
                </div>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-primary" onclick="bookSlot()">确认预约</button>
                <button class="btn btn-secondary" onclick="resetInput()">重置输入</button>
            </div>
            <div id="message"></div>
        </div>

        <div class="time-bar-container">
            <h5 class="mb-3">当日24小时预约状态（绿色=未预约，红色=已预约）</h5>
            <div class="time-bar" id="time-bar"></div>
            <div class="time-ticks" id="time-ticks"></div>
        </div>

        <div class="form-area">
            <h5 class="mb-3">已预约时段列表</h5>
            <div id="booked-list"></div>
        </div>

        <div class="form-area">
            <h5 class="mb-3">
                使用时长统计
                <button class="btn btn-sm btn-outline-primary ms-2" onclick="refreshStatistics()">刷新统计</button>
            </h5>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">统计日期范围</label>
                    <div class="d-flex gap-2">
                        <input type="date" id="stat-start-date" class="form-control">
                        <span>至</span>
                        <input type="date" id="stat-end-date" class="form-control">
                    </div>
                </div>
                <div class="col-md-6 d-flex align-items-end">
                    <button class="btn btn-sm btn-info w-100" onclick="filterStatistics()">按日期筛选统计</button>
                </div>
            </div>
            <div id="statistics-list">
                <div class="text-muted text-center">点击刷新统计查看数据</div>
            </div>
        </div>
    </div>

    <script>
        // ====================== 云端数据库配置 ======================
        const firebaseConfig = {
            apiKey: "AIzaSyD7RzHtQH4l4Y4c4Z3Q4l4X4x4w4v4u4t4s4r4q4p4o4n4m4l4k4j4i4h4g4f4e4d4c4b4a4",
            authDomain: "booking-system-123.firebaseapp.com",
            databaseURL: "https://booking-system-123-default-rtdb.firebaseio.com",
            projectId: "booking-system-123",
            storageBucket: "booking-system-123.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abcdef1234567890abcdef"
        };

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 当前系统
        let currentSystem = 'cpl';
        const today = new Date().toISOString().split('T')[0];
        document.getElementById("date-picker").value = today;
        document.getElementById("stat-start-date").value = today;
        document.getElementById("stat-end-date").value = today;

        window.onload = function() {
            generateTimeTicks();
            listenBookings(); // 实时监听云端数据
            refreshStatistics();
            document.getElementById("date-picker").addEventListener("change", listenBookings);
        };

        // 切换系统
        function switchSystem(system) {
            currentSystem = system;
            document.querySelectorAll('.system-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('system-title').textContent = `${system.toUpperCase()}测试预约系统（云端同步）`;
            listenBookings();
            refreshStatistics();
            document.getElementById('message').innerHTML = '';
        }

        // 生成时间刻度
        function generateTimeTicks() {
            const ticksContainer = document.getElementById("time-ticks");
            let html = "";
            for (let i = 0; i <= 24; i++) {
                html += `<div>${i.toString().padStart(2, '0')}:00</div>`;
            }
            ticksContainer.innerHTML = html;
        }

        // 时间格式化
        function formatTime(h, m, s) {
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function formatSecondsToHMS(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // ====================== 云端实时同步核心 ======================
        function listenBookings() {
            const date = document.getElementById("date-picker").value;
            const path = `${currentSystem}/${date}`;

            db.ref(path).on('value', (snapshot) => {
                const data = snapshot.val() || {};
                renderBookings(data);
                refreshStatistics();
            });
        }

        // 渲染预约数据
        function renderBookings(dateBookings) {
            const timeBar = document.getElementById("time-bar");
            const bookedList = document.getElementById("booked-list");
            timeBar.innerHTML = "";
            bookedList.innerHTML = "";

            const keys = Object.keys(dateBookings);
            if (keys.length === 0) {
                bookedList.innerHTML = '<div class="text-muted text-center">当前日期暂无预约</div>';
                return;
            }

            let listHtml = "";
            keys.forEach(key => {
                const person = dateBookings[key];
                const [start, end] = key.split("-");
                const [sH, sM, sS] = start.split(":").map(Number);
                const [eH, eM, eS] = end.split(":").map(Number);
                const dur = formatSecondsToHMS((eH*3600+eM*60+eS)-(sH*3600+sM*60+sS));

                listHtml += `
                <div class="booked-item">
                    <div>${document.getElementById("date-picker").value} | ${start}-${end} | ${person} | 时长：${dur}</div>
                    <button class="btn btn-sm btn-danger" onclick="cancelSlot('${key}')">取消</button>
                </div>`;

                const startSec = sH*3600+sM*60+sS;
                const endSec = eH*3600+eM*60+eS;
                const left = (startSec / 86400) * 100;
                const width = ((endSec - startSec) / 86400) * 100;

                const block = document.createElement("div");
                block.className = "booked-block";
                block.style.left = left + "%";
                block.style.width = width + "%";
                block.innerText = `${start}-${end} ${person}`;
                timeBar.appendChild(block);
            });

            bookedList.innerHTML = listHtml;
        }

        // 预约（保存到云端）
        async function bookSlot() {
            const date = document.getElementById("date-picker").value;
            const sH = +document.getElementById("start-hour").value || 0;
            const sM = +document.getElementById("start-min").value || 0;
            const sS = +document.getElementById("start-sec").value || 0;
            const eH = +document.getElementById("end-hour").value || 0;
            const eM = +document.getElementById("end-min").value || 0;
            const eS = +document.getElementById("end-sec").value || 0;
            const person = document.getElementById("person-name").value.trim();

            if (!date || !person) {
                showMessage("请填写完整信息", "warning");
                return;
            }

            const start = formatTime(sH, sM, sS);
            const end = formatTime(eH, eM, eS);
            const startSec = sH*3600+sM*60+sS;
            const endSec = eH*3600+eM*60+eS;

            if (startSec >= endSec) {
                showMessage("结束时间必须晚于开始时间", "danger");
                return;
            }

            const snapshot = await db.ref(`${currentSystem}/${date}`).get();
            const data = snapshot.val() || {};

            for (const key in data) {
                const [s, e] = key.split("-");
                const [sh, sm, ss] = s.split(":").map(Number);
                const [eh, em, es] = e.split(":").map(Number);
                const ts = sh*3600+sm*60+ss;
                const te = eh*3600+em*60+es;
                if (!(endSec <= ts || startSec >= te)) {
                    showMessage(`时段冲突：${s}-${e}`, "danger");
                    return;
                }
            }

            await db.ref(`${currentSystem}/${date}/${start}-${end}`).set(person);
            showMessage("预约成功（已同步云端）", "success");
            resetInput();
        }

        // 取消预约（云端同步）
        async function cancelSlot(key) {
            if (!confirm("确定取消？")) return;
            const date = document.getElementById("date-picker").value;
            await db.ref(`${currentSystem}/${date}/${key}`).remove();
            showMessage("已取消（已同步云端）", "success");
        }

        // 重置输入
        function resetInput() {
            document.getElementById("start-hour").value = 0;
            document.getElementById("start-min").value = 0;
            document.getElementById("start-sec").value = 0;
            document.getElementById("end-hour").value = 1;
            document.getElementById("end-min").value = 0;
            document.getElementById("end-sec").value = 0;
            document.getElementById("person-name").value = "";
        }

        // 提示消息
        function showMessage(text, type) {
            const msg = document.getElementById("message");
            msg.innerHTML = `<div class="alert alert-${type}">${text}</div>`;
            setTimeout(() => msg.innerHTML = "", 3000);
        }

        // 统计（云端）
        async function calculateStatistics(startDate, endDate) {
            const snapshot = await db.ref(currentSystem).get();
            const allData = snapshot.val() || {};
            const stats = {};
            let total = 0;

            for (const date in allData) {
                if (startDate && endDate && (date < startDate || date > endDate)) continue;
                const dayData = allData[date];
                for (const key in dayData) {
                    const p = dayData[key];
                    const [s, e] = key.split("-");
                    const [sh, sm, ss] = s.split(":").map(Number);
                    const [eh, em, es] = e.split(":").map(Number);
                    const d = (eh*3600+em*60+es) - (sh*3600+sm*60+ss);
                    stats[p] = (stats[p] || 0) + d;
                    total += d;
                }
            }

            return { stats, total };
        }

        async function refreshStatistics() {
            const res = await calculateStatistics();
            renderStats(res);
        }

        async function filterStatistics() {
            const s = document.getElementById("stat-start-date").value;
            const e = document.getElementById("stat-end-date").value;
            if (!s || !e || s > e) {
                showMessage("日期范围错误", "warning");
                return;
            }
            const res = await calculateStatistics(s, e);
            renderStats(res);
        }

        function renderStats({ stats, total }) {
            const list = document.getElementById("statistics-list");
            const keys = Object.keys(stats);
            if (keys.length === 0) {
                list.innerHTML = '<div class="text-muted text-center">暂无统计数据</div>';
                return;
            }

            let html = "";
            keys.forEach(k => {
                html += `<div class="stat-item"><div><strong>${k}</strong><div class="duration-label">总时长</div></div><div>${formatSecondsToHMS(stats[k])}</div></div>`;
            });
            html += `<div class="stat-item stat-total"><div><strong>总计</strong></div><div>${formatSecondsToHMS(total)}</div></div>`;
            list.innerHTML = html;
        }
    </script>
</body>
</html>
